<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#2c3e50">
    <title>Studio Gear Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-left">
                <h1>🎛️ Studio Gear Manager</h1>
            </div>
            <div class="header-right">
                <button id="donate-button" class="btn-donate" title="Spenden" style="display: flex;">❤️ Spenden</button>
                <button id="search-toggle-btn" class="btn-icon" title="Suche">🔍</button>
                <div id="search-container" class="search-container hidden">
                    <input type="text" id="search-input" placeholder="Volltextsuche..." autocomplete="off">
                    <button id="search-close-btn" class="btn-icon">✕</button>
                </div>
                <button id="view-grid-btn" class="btn-icon active" title="Grid-Ansicht">▦</button>
                <button id="view-list-btn" class="btn-icon" title="Listenansicht">☰</button>
                <button id="setup-btn" class="btn-icon" title="Einstellungen">⚙️</button>
            </div>
        </header>
        
        <nav id="main-nav">
            <button class="nav-btn active" data-view="library">📦 Bibliothek</button>
            <button class="nav-btn" data-view="wishlist">⭐ Wunschliste</button>
        </nav>
        
        <div id="filter-bar">
            <select id="sort-select">
                <option value="name-asc">Name A-Z</option>
                <option value="name-desc">Name Z-A</option>
                <option value="manufacturer-asc">Hersteller A-Z</option>
                <option value="manufacturer-desc">Hersteller Z-A</option>
                <option value="value-desc">Wert höchster</option>
                <option value="value-asc">Wert niedrigster</option>
                <option value="date-added-desc">Neueste zuerst</option>
            </select>
            <select id="category-filter">
                <option value="all">Alle Kategorien</option>
            </select>
            <button id="add-gear-btn" class="btn-primary">+ Neues Gerät</button>
            <button id="export-btn" class="btn-secondary">📥 Backup exportieren</button>
            <button id="import-btn" class="btn-secondary">📤 Backup importieren</button>
            <input type="file" id="import-file-input" accept=".json" style="display:none;">
            <button id="csv-export-btn" class="btn-secondary">📊 CSV exportieren</button>
        </div>
        
        <main id="content">
            <div id="library-view" class="view active">
                <div id="gear-grid" class="gear-grid"></div>
                <div id="gear-list" class="gear-list hidden">
                    <table class="gear-table">
                        <thead>
                            <tr>
                                <th data-col="photo">Foto</th>
                                <th data-col="name">Name</th>
                                <th data-col="manufacturer">Hersteller</th>
                                <th data-col="category">Kategorie</th>
                                <th data-col="value">Wert</th>
                                <th data-col="power">Strom</th>
                                <th data-col="actions">Aktionen</th>
                            </tr>
                        </thead>
                        <tbody id="gear-table-body"></tbody>
                    </table>
                </div>
            </div>
            <div id="wishlist-view" class="view">
                <div class="wishlist-header">
                    <button id="add-wish-btn" class="btn-primary">+ Wunsch hinzufügen</button>
                </div>
                <div id="wishlist-grid" class="gear-grid"></div>
            </div>
        </main>
    </div>
    
    <!-- Setup Dialog -->
    <div id="setup-dialog" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Einstellungen</h2>
            <div class="setup-section">
                <h3>Sprache / Language</h3>
                <select id="language-select">
                    <option value="de">Deutsch</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="setup-section">
                <h3>Theme</h3>
                <select id="theme-select">
                    <option value="dark">Dunkel</option>
                    <option value="light">Hell</option>
                </select>
            </div>
            <div class="setup-section">
                <h3>Akzentfarbe</h3>
                <input type="color" id="accent-color-input" value="#3498db">
            </div>
            <div class="setup-section">
                <h3>Ansichts-Optionen</h3>
                <label><input type="checkbox" id="show-photos-check" checked> Fotos anzeigen</label>
                <label><input type="checkbox" id="show-values-check" checked> Werte anzeigen</label>
            </div>
            <div class="setup-section">
                <h3>Beschriftungen anpassen</h3>
                <label>Kategorie 1: <input type="text" id="label-cat1" placeholder="z.B. Mikrofone"></label>
                <label>Kategorie 2: <input type="text" id="label-cat2" placeholder="z.B. Preamps"></label>
                <label>Kategorie 3: <input type="text" id="label-cat3" placeholder="z.B. Monitore"></label>
                <label>Kategorie 4: <input type="text" id="label-cat4" placeholder="z.B. Outboard"></label>
                <label>Kategorie 5: <input type="text" id="label-cat5" placeholder="z.B. Kabel/Zubehör"></label>
            </div>
            <div class="setup-section">
                <h3>Spenden-Button</h3>
                <label>
                    <input type="checkbox" id="show-donation-btn" checked> 
                    Spenden-Button in der Kopfzeile anzeigen
                </label>
            </div>
            <div class="setup-section">
                <h3>Daten</h3>
                <button id="load-demo-btn" class="btn-secondary">Demo-Daten laden</button>
                <button id="reset-btn" class="btn-danger">Alle Daten löschen</button>
                <button id="export-logs-btn" class="btn-secondary">📋 Logs exportieren</button>
            </div>
            <button id="close-setup-btn" class="btn-primary">Schließen</button>
        </div>
    </div>
    
    <!-- Detail Dialog -->
    <div id="detail-dialog" class="modal" style="display:none;">
        <div class="modal-content detail-content">
            <button id="close-detail-btn" class="btn-close">✕</button>
            <div id="detail-tabs" class="tabs">
                <button class="tab-btn active" data-tab="overview">Übersicht</button>
                <button class="tab-btn" data-tab="audio">Audio</button>
                <button class="tab-btn" data-tab="midi">MIDI</button>
                <button class="tab-btn" data-tab="power">Strom</button>
                <button class="tab-btn" data-tab="value">Wert</button>
                <button class="tab-btn" data-tab="documents">Dokumente</button>
                <button class="tab-btn" data-tab="notes">Notizen</button>
            </div>
            <div id="detail-content-area"></div>
        </div>
    </div>
    
    <!-- Dokument Dialog -->
    <div id="doc-dialog" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Dokument hinzufügen</h3>
            <div class="form-group">
                <label>Name: <input type="text" id="doc-name-input" placeholder="z.B. Bedienungsanleitung"></label>
            </div>
            <div class="form-group">
                <label>Typ:</label>
                <select id="doc-type-select">
                    <option value="file">Datei-Upload (PDF, Bild, etc.)</option>
                    <option value="url">Externe URL / Link</option>
                </select>
            </div>
            <div id="doc-file-upload-area" class="form-group">
                <input type="file" id="doc-file-input" accept=".pdf,.png,.jpg,.jpeg,.webp,.doc,.docx">
            </div>
            <div id="doc-url-input-area" class="form-group" style="display:none;">
                <input type="text" id="doc-url-input" placeholder="https://..." style="width:100%;">
            </div>
            <div class="form-actions">
                <button id="add-doc-confirm-btn" class="btn-primary">Hinzufügen</button>
                <button id="close-doc-btn" class="btn-secondary">Abbrechen</button>
            </div>
        </div>
    </div>
    
    <!-- Wish Dialog -->
    <div id="wish-dialog" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Wunsch hinzufügen</h3>
            <div class="form-group">
                <label>Name: <input type="text" id="wish-name-input"></label>
            </div>
            <div class="form-group">
                <label>Hersteller: <input type="text" id="wish-manufacturer-input"></label>
            </div>
            <div class="form-group">
                <label>Preis (€): <input type="number" id="wish-price-input" step="0.01"></label>
            </div>
            <div class="form-group">
                <label>Link: <input type="text" id="wish-link-input"></label>
            </div>
            <div class="form-actions">
                <button id="add-wish-confirm-btn" class="btn-primary">Hinzufügen</button>
                <button id="close-wish-btn" class="btn-secondary">Abbrechen</button>
            </div>
        </div>
    </div>
    
    <!-- Foto-Vergrößerung -->
    <div id="photo-modal" class="modal" style="display:none;">
        <span id="photo-modal-close" class="btn-close">✕</span>
        <img id="photo-modal-img" src="" alt="Vergrößertes Foto">
    </div>
    
    <script src="app.js"></script>
</body>
</html>
