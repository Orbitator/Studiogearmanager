<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Gear Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
</head>
<body>
    <div id="app">
        <header>
            <h1>🎛️ Studio Gear Manager</h1>
            <div class="header-actions">
                <button id="donate-button" class="btn-donate">❤️ Spenden</button>
                <button id="search-toggle" class="btn-icon" title="Suche">🔍</button>
                <button id="view-grid" class="btn-icon active" title="Grid-Ansicht">▦</button>
                <button id="view-list" class="btn-icon" title="Listenansicht">☰</button>
                <button id="setup-button" class="btn-icon" title="Einstellungen">⚙️</button>
            </div>
            <div id="search-bar" class="search-bar hidden">
                <input type="text" id="search-input" placeholder="Volltextsuche...">
                <button id="search-close" class="btn-icon">✕</button>
            </div>
        </header>
        
        <nav id="main-nav">
            <button class="nav-btn active" data-view="library">📦 Bibliothek</button>
            <button class="nav-btn" data-view="wishlist">⭐ Wunschliste</button>
        </nav>
        
        <div id="controls">
            <select id="sort-select">
                <option value="name-asc">Name A-Z</option>
                <option value="name-desc">Name Z-A</option>
                <option value="manufacturer-asc">Hersteller A-Z</option>
                <option value="manufacturer-desc">Hersteller Z-A</option>
                <option value="value-desc">Wert höchster</option>
                <option value="value-asc">Wert niedrigster</option>
                <option value="date-desc">Neueste zuerst</option>
            </select>
            <select id="category-filter">
                <option value="all">Alle Kategorien</option>
            </select>
            <button id="add-gear" class="btn-primary">+ Neues Gerät</button>
            <button id="export-backup" class="btn-secondary">📥 Backup exportieren</button>
            <button id="import-backup" class="btn-secondary">📤 Backup importieren</button>
            <input type="file" id="import-file" accept=".json" style="display:none;">
            <button id="export-csv" class="btn-secondary">📊 CSV exportieren</button>
        </div>
        
        <main id="content">
            <div id="library-view" class="view active">
                <div id="gear-grid" class="gear-grid"></div>
                <table id="gear-table" class="gear-table hidden">
                    <thead>
                        <tr>
                            <th data-col="photo">Foto</th>
                            <th data-col="name">Name</th>
                            <th data-col="manufacturer">Hersteller</th>
                            <th data-col="category">Kategorie</th>
                            <th data-col="value">Wert</th>
                            <th data-col="power">Strom</th>
                            <th data-col="actions">Aktionen</th>
                        </tr>
                    </thead>
                    <tbody id="gear-table-body"></tbody>
                </table>
            </div>
            <div id="wishlist-view" class="view">
                <button id="add-wish" class="btn-primary">+ Wunsch hinzufügen</button>
                <div id="wishlist-grid" class="gear-grid"></div>
            </div>
        </main>
    </div>
    
    <!-- Setup Modal -->
    <div id="setup-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Einstellungen</h2>
            <div class="setting">
                <label>Sprache</label>
                <select id="setting-language">
                    <option value="de">Deutsch</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="setting">
                <label>Theme</label>
                <select id="setting-theme">
                    <option value="dark">Dunkel</option>
                    <option value="light">Hell</option>
                </select>
            </div>
            <div class="setting">
                <label>Akzentfarbe</label>
                <input type="color" id="setting-accent" value="#3498db">
            </div>
            <div class="setting">
                <label><input type="checkbox" id="setting-photos" checked> Fotos anzeigen</label>
            </div>
            <div class="setting">
                <label><input type="checkbox" id="setting-values" checked> Werte anzeigen</label>
            </div>
            <div class="setting">
                <label><input type="checkbox" id="setting-donation" checked> Spenden-Button anzeigen</label>
            </div>
            <div class="setting">
                <label>Kategorie 1</label>
                <input type="text" id="setting-cat1" placeholder="z.B. Mikrofone">
            </div>
            <div class="setting">
                <label>Kategorie 2</label>
                <input type="text" id="setting-cat2" placeholder="z.B. Preamps">
            </div>
            <div class="setting">
                <label>Kategorie 3</label>
                <input type="text" id="setting-cat3" placeholder="z.B. Monitore">
            </div>
            <div class="setting">
                <label>Kategorie 4</label>
                <input type="text" id="setting-cat4" placeholder="z.B. Outboard">
            </div>
            <div class="setting">
                <label>Kategorie 5</label>
                <input type="text" id="setting-cat5" placeholder="z.B. Kabel/Zubehör">
            </div>
            <div class="modal-actions">
                <button id="load-demo" class="btn-secondary">Demo-Daten laden</button>
                <button id="reset-data" class="btn-danger">Alle Daten löschen</button>
                <button id="export-logs" class="btn-secondary">📋 Logs exportieren</button>
                <button id="close-setup" class="btn-primary">Schließen</button>
            </div>
        </div>
    </div>
    
    <!-- Detail Modal -->
    <div id="detail-modal" class="modal" style="display:none;">
        <div class="modal-content detail-content">
            <span id="close-detail" class="close-btn">✕</span>
            <div id="detail-tabs" class="tabs">
                <button class="tab-btn active" data-tab="overview">Übersicht</button>
                <button class="tab-btn" data-tab="audio">Audio</button>
                <button class="tab-btn" data-tab="midi">MIDI</button>
                <button class="tab-btn" data-tab="power">Strom</button>
                <button class="tab-btn" data-tab="value">Wert</button>
                <button class="tab-btn" data-tab="documents">Dokumente</button>
                <button class="tab-btn" data-tab="notes">Notizen</button>
            </div>
            <div id="detail-content"></div>
        </div>
    </div>
    
    <!-- Document Modal -->
    <div id="doc-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Dokument hinzufügen</h3>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="doc-name" placeholder="z.B. Bedienungsanleitung">
            </div>
            <div class="form-group">
                <label>Typ</label>
                <select id="doc-type">
                    <option value="file">Datei-Upload</option>
                    <option value="url">URL / Link</option>
                </select>
            </div>
            <div id="doc-file-area" class="form-group">
                <input type="file" id="doc-file" accept=".pdf,.png,.jpg,.jpeg,.webp">
            </div>
            <div id="doc-url-area" class="form-group" style="display:none;">
                <input type="text" id="doc-url" placeholder="https://...">
            </div>
            <div class="modal-actions">
                <button id="doc-save" class="btn-primary">Hinzufügen</button>
                <button id="doc-cancel" class="btn-secondary">Abbrechen</button>
            </div>
        </div>
    </div>
    
    <!-- Wish Modal -->
    <div id="wish-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Wunsch hinzufügen</h3>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="wish-name">
            </div>
            <div class="form-group">
                <label>Hersteller</label>
                <input type="text" id="wish-manufacturer">
            </div>
            <div class="form-group">
                <label>Preis (€)</label>
                <input type="number" id="wish-price" step="0.01">
            </div>
            <div class="form-group">
                <label>Link</label>
                <input type="text" id="wish-link">
            </div>
            <div class="modal-actions">
                <button id="wish-save" class="btn-primary">Hinzufügen</button>
                <button id="wish-cancel" class="btn-secondary">Abbrechen</button>
            </div>
        </div>
    </div>
    
    <!-- Photo Modal -->
    <div id="photo-modal" class="modal" style="display:none;">
        <span id="photo-close" class="close-btn">✕</span>
        <img id="photo-img" src="" alt="Foto">
    </div>
    
    <script src="app.js"></script>
</body>
</html>
